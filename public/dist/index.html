    <link rel="icon" type="image/png" href="./favicon/android.png">

<body style="background-color: #0213f7; font-family: 'Orbitron', sans-serif;">

    <!-- Connect Wallet Button -->
    <button id="connectWallet" style="opacity: 0">
    </button>

    <!-- Player Info and Controls -->
    <div id="userDisplay"></div>
    <div id="playerCountDisplay"></div>

    <!-- Battery Status -->
    <div id="battery-status" class="battery-container">
        <div id="battery-percentage" class="battery-percentage"></div>
        <div class="battery-bar"></div>
    </div>

    <!-- Speedometer -->
    <div id="speedometer">
        <div id="needle"></div>
        <div id="speed-value"></div>
    </div>

    <!-- Party Chat -->
    <div id="party-chat-container" class="chat-box" style="display: none;">
        <div id="party-chat-box" class="chat-box-body"></div>
        <div class="chat-box-footer">
            <input id="party-message-input" type="text" placeholder="Type a message..." class="chat-input">
            <button id="send-message-button" class="send-button">
                <i data-feather="send"></i>
            </button>
        </div>
    </div>

    <!-- Score Display -->
    <div id="score-status" class="player-score"></div>

    <!-- Market and Player ID -->
    <div id="coin-market"></div>
    <div id="target-player-id"></div>

    <!-- Invite Button -->
    <button id="invite-button" style="opacity: 0"></button>

    <!-- User Interface -->
    <div id="touch-radio" style="opacity: 0"></div>
    <div id="touch-mute" style="opacity: 0"></div>
    <input id="touch-slider" style="opacity: 0">

    <!-- Score Animation and Loading Layer -->
    <div id="score-animation-container"></div>
    <div id="loadingLayer" class="loading-layer"></div>

    <!-- Game Canvas -->
    <canvas class="canvas js-canvas"></canvas>

    <!-- Switch Container -->
    <div id="switch-container">
        <div id="switch">
            <div id="switch-toggle"></div>
        </div>
    </div>

    <!-- Feather Icons Replacement -->
    <script>
        feather.replace();
    </script>

<script type="text/javascript" src="bundle.107cb5af516bddae170a.js"></script></body>
